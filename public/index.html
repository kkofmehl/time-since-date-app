<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Time since / until</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <h1 class="title">Time since / until</h1>
        <p class="subtitle">Track elapsed or remaining time from a single instant.</p>
      </header>

      <main>
        <section id="list-view" class="panel" aria-labelledby="list-heading">
          <h2 id="list-heading" class="panel-title">Timers</h2>
          <p class="list-hint">Tap a timer to edit, reset, view details, or delete.</p>

          <form id="create-form" class="create-form">
            <label class="field">
              <span class="label">Name</span>
              <input type="text" name="name" required autocomplete="off" placeholder="e.g. Last vacation" />
            </label>
            <label class="field">
              <span class="label">Target date &amp; time</span>
              <input type="datetime-local" name="target" required />
            </label>
            <button type="submit" class="btn primary">Add timer</button>
          </form>

          <p id="list-empty" class="empty" hidden>No timers yet. Add one above.</p>
          <ul id="timer-list" class="timer-list"></ul>
        </section>

        <section id="detail-view" class="panel" hidden aria-labelledby="detail-heading">
          <div class="detail-toolbar">
            <button type="button" id="detail-back" class="btn ghost">&larr; Back to list</button>
          </div>
          <h2 id="detail-heading" class="panel-title">Timer details</h2>
          <div id="detail-content" class="detail-content"></div>
        </section>
      </main>
    </div>
    <script src="/app.js" defer></script>
  </body>
</html>
